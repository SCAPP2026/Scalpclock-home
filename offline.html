<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Offline — ScalpClock</title>
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#16d97e">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a08;
  --green:#16d97e;
  --text:#eef3f0;
  --t70:rgba(238,243,240,.70);
  --t45:rgba(238,243,240,.45);
  --disp:'Rajdhani',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(22,217,126,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(22,217,126,.04) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
.page{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;gap:18px;
}
.logo-mark{
  width:64px;height:64px;flex-shrink:0;
  background:rgba(22,217,126,.10);
  border:1.5px solid rgba(22,217,126,.25);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.logo-mark svg{width:36px;height:36px;}
h1{font-family:var(--disp);font-size:clamp(1.6rem,5vw,2.2rem);font-weight:700;}
h1 em{color:var(--green);font-style:normal;}
p{font-size:.95rem;color:var(--t70);max-width:380px;line-height:1.6;}
.retry-btn{
  margin-top:8px;
  font-family:var(--disp);font-weight:700;font-size:.95rem;
  background:var(--green);color:#04150d;
  border:none;border-radius:10px;
  padding:12px 28px;cursor:pointer;
  transition:background .2s,transform .2s;
}
.retry-btn:hover{background:#20e88a;transform:translateY(-1px);}
.hint{font-size:.75rem;color:var(--t45);margin-top:4px;}
</style>
</head>
<body>
<main class="page">
  <div class="logo-mark">
    <svg viewBox="0 0 18 18" fill="none" stroke="#16d97e" stroke-width="1.8" stroke-linecap="round">
      <circle cx="9" cy="9" r="7"/>
      <line x1="9" y1="9" x2="9" y2="4.2"/>
      <line x1="9" y1="9" x2="12.8" y2="9"/>
    </svg>
  </div>
  <h1>You're <em>offline</em></h1>
  <p>ScalpClock needs a connection to load live signals and charts. Check your network and try again — anything you'd already opened may still be available from cache.</p>
  <button class="retry-btn" onclick="location.reload()">Retry</button>
  <p class="hint">The Time To Profit Is Now — once you're back online.</p>
</main>
</body>
</html>

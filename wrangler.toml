name = "scalpclock"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# KV namespace used by functions/api/chart-feedback.js to enforce the
# monthly (600 total) and daily (5/user) caps on paid Anthropic vision calls.
# Must also be bound in the Cloudflare Pages dashboard (Settings → Functions
# → KV namespace bindings) for production — this entry only covers local
# `wrangler pages dev`.
[[kv_namespaces]]
binding = "CHART_FEEDBACK_KV"
id = "34e6e1c9f8a4452b80e756848db5eb3a"

# Secrets — set in Cloudflare dashboard → Settings → Environment variables
# Alpaca (market data):
#   ALPACA_KEY_ID, ALPACA_SECRET
# Anthropic (chart-upload AI feedback in scalpchart.html's Chart Review tab):
#   ANTHROPIC_API_KEY — sk-ant-... from console.anthropic.com; used with
#   model claude-sonnet-5, gated behind Pro plan + the KV caps above
# Stripe (payments):
#   STRIPE_SECRET_KEY         — sk_live_... from Stripe dashboard
#   STRIPE_WEBHOOK_SECRET     — whsec_... from Stripe webhook endpoint settings
#   STRIPE_PRICE_PRO_MONTHLY  — price_... for $9.99/mo product
#   STRIPE_PRICE_PRO_ANNUAL   — price_... for $95.88/yr product (~$7.99/mo)
#   STRIPE_PRICE_ELITE_MONTHLY — price_... (when Elite launches)
#   STRIPE_PRICE_ELITE_ANNUAL  — price_... (when Elite launches)
# News feeds (all optional — sources with no key are silently skipped):
#   POLYGON_KEY  — api.polygon.io key (also used for news endpoint)
#   FINNHUB_KEY  — finnhub.io key (free tier: 60 calls/min)
#   FMP_KEY      — financialmodelingprep.com key (free tier: 250 req/day)
#   BENZINGA_KEY — api.benzinga.com key (paid)
#   NEWSAPI_KEY  — newsapi.org key (free dev / paid prod)
#   TE_KEY       — api.tradingeconomics.com key (paid)
# Never commit actual values to source control.


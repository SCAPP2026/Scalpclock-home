name = "scalpclock"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Secrets — set in Cloudflare dashboard → Settings → Environment variables
# Required:  ALPACA_KEY_ID, ALPACA_SECRET
# These are never committed to source control.

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.js", "**/*.css", "**/*.toml"]
fallthrough = true

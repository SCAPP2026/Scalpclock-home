<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScalpClock — Sign In</title>
<link rel="icon" href="hero.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a08;--panel:rgba(14,22,16,.90);
  --line:rgba(120,200,160,.13);--green:#16d97e;
  --text:#eef3f0;--t55:rgba(238,243,240,.55);--t30:rgba(238,243,240,.30);
  --disp:'Rajdhani',sans-serif;--body:'Inter',system-ui,sans-serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(60% 50% at 50% -5%,rgba(22,217,126,.11),transparent 68%),
  linear-gradient(rgba(120,200,160,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(120,200,160,.03) 1px,transparent 1px);
  background-size:auto,48px 48px,48px 48px;}
.box{position:relative;z-index:1;width:100%;max-width:420px;}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;
  font-family:var(--disp);font-weight:700;font-size:1.6rem;letter-spacing:.02em;text-decoration:none;color:var(--text);}
.b-mark{width:36px;height:36px;border-radius:9px;background:radial-gradient(circle at 50% 40%,#1a2b22,#070a08);
  border:1px solid rgba(22,217,126,.55);box-shadow:0 0 16px rgba(22,217,126,.30);display:grid;place-items:center;}
.b-mark svg{width:20px;height:20px;}
.brand em{color:var(--green);font-style:normal;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px;
  box-shadow:0 24px 64px rgba(0,0,0,.5);}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--line);}
.tab{flex:1;text-align:center;padding:10px;font-family:var(--disp);font-weight:700;font-size:1rem;
  color:var(--t55);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.form{display:flex;flex-direction:column;gap:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:.82rem;color:var(--t55);font-weight:500;}
input{background:rgba(7,10,8,.8);border:1px solid var(--line);border-radius:9px;
  padding:11px 14px;color:var(--text);font-family:var(--body);font-size:.95rem;outline:none;transition:.15s;}
input:focus{border-color:rgba(22,217,126,.5);box-shadow:0 0 0 3px rgba(22,217,126,.08);}
input::placeholder{color:var(--t30);}
.btn-main{font-family:var(--disp);font-weight:700;font-size:1rem;padding:13px;border-radius:10px;
  background:var(--green);color:#04150d;border:none;cursor:pointer;transition:.15s;margin-top:4px;}
.btn-main:hover{background:#20e88a;}
.btn-main:disabled{opacity:.5;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:12px;color:var(--t30);font-size:.8rem;margin:4px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(205,211,210,.2);border-radius:10px;
  padding:12px;color:var(--text);font-family:var(--body);font-weight:500;font-size:.9rem;
  cursor:pointer;transition:.15s;width:100%;}
.btn-google:hover{border-color:rgba(22,217,126,.3);}
.msg{font-size:.83rem;padding:10px 14px;border-radius:8px;text-align:center;margin-bottom:8px;}
.error{background:rgba(255,59,70,.1);border:1px solid rgba(255,59,70,.3);color:#ff3b46;}
.success{background:rgba(22,217,126,.1);border:1px solid rgba(22,217,126,.3);color:var(--green);}
.footer-note{text-align:center;margin-top:20px;font-size:.78rem;color:var(--t30);}
.footer-note a{color:var(--green);text-decoration:none;}
</style>
</head>
<body>
<div class="box">
  <a class="brand" href="/">
    <span class="b-mark">
      <svg viewBox="0 0 18 18" fill="none" stroke="#16d97e" stroke-width="1.8" stroke-linecap="round">
        <circle cx="9" cy="9" r="7"/>
        <line x1="9" y1="9" x2="9" y2="4.5"/>
        <line x1="9" y1="9" x2="12.5" y2="9"/>
      </svg>
    </span>
    Scalp<em>Clock</em>
  </a>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="showTab('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="showTab('signup')">Create Account</div>
    </div>

    <div id="msg"></div>

    <!-- SIGN IN -->
    <div id="signin-form" class="form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="••••••••">
      </div>
      <button class="btn-main" id="si-btn" onclick="signIn()">Sign In</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGN UP -->
    <div id="signup-form" class="form" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="su-pass" placeholder="At least 6 characters">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="su-pass2" placeholder="••••••••">
      </div>
      <button class="btn-main" id="su-btn" onclick="signUp()">Create Account</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
  <p class="footer-note">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
</div>

<script>
const SUPABASE_URL = 'https://fnuqxiflqqejjttxymbz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZudXF4aWZscXFlamp0dHh5bWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzMxODksImV4cCI6MjA5ODAwOTE4OX0.XE1-LPW0043gRFEAl9onCahkmpQ8BMAAtGkF9FqJLiY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/';
});

function showTab(tab) {
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('signin-form').style.display = tab === 'signin' ? 'flex' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
  document.getElementById('msg').innerHTML = '';
}

function showMsg(text, type) {
  document.getElementById('msg').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

async function signIn() {
  const email = document.getElementById('si-email').value.trim();
  const pass  = document.getElementById('si-pass').value;
  if (!email || !pass) return showMsg('Please fill in all fields.', 'error');
  const btn = document.getElementById('si-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    window.location.href = '/';
  }
}

async function signUp() {
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-pass').value;
  const pass2 = document.getElementById('su-pass2').value;
  if (!email || !pass) return showMsg('Please fill in all fields.', 'error');
  if (pass !== pass2) return showMsg('Passwords do not match.', 'error');
  if (pass.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
  const btn = document.getElementById('su-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) {
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  } else {
    showMsg('Account created! Check your email to confirm your account.', 'success');
  }
}

async function signInGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://scalpclock.com/' }
  });
}
</script>
</body>
</html>

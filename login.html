<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(60% 50% at 50% -5%,rgba(22,217,126,.08),transparent 68%),
  linear-gradient(var(--line) 1px,transparent 1px),
  linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:auto,48px 48px,48px 48px;}
.box{position:relative;z-index:1;width:100%;max-width:420px;}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;justify-content:center;margin-bottom:32px;}
.brand-text{display:flex;flex-direction:column;gap:2px;}
.brand-name{font-family:var(--disp);font-weight:700;font-size:1.45rem;letter-spacing:.02em;color:var(--text);line-height:1;}
.brand-name em{color:var(--green);font-style:normal;}
.brand-motto{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green-ink);opacity:.9;white-space:nowrap;}
.b-mark{width:34px;height:34px;border-radius:10px;background:radial-gradient(circle at 50% 40%,#1a2b22,#070a08);border:1px solid rgba(22,217,126,.55);box-shadow:0 0 18px rgba(22,217,126,.30);display:grid;place-items:center;flex-shrink:0;}
.b-mark svg{width:18px;height:18px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px;
  box-shadow:var(--shadow-lg);}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--line);}
.tab{flex:1;text-align:center;padding:10px;font-family:var(--disp);font-weight:700;font-size:1rem;
  color:var(--t65);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;}
.tab.active{color:var(--green-ink);border-bottom-color:var(--green);}
.form{display:flex;flex-direction:column;gap:16px;}
.field{display:flex;flex-direction:column;gap:6px;min-width:0;}
label{font-size:.82rem;color:var(--t65);font-weight:500;}

.msg{font-size:.83rem;padding:10px 14px;border-radius:8px;text-align:center;margin-bottom:8px;}
.error{background:rgba(197,35,35,.08);border:1px solid rgba(197,35,35,.3);color:var(--red-ink);}
.success{background:var(--green-soft);border:1px solid rgba(22,217,126,.35);color:var(--green-ink);}
.footer-note{text-align:center;margin-top:20px;font-size:.78rem;color:var(--t45);}
.footer-note a{color:var(--green-ink);text-decoration:none;}
.clock-svg .hand-min{transform-origin:9px 9px;animation:spin-min 6s linear infinite;}
.clock-svg .hand-sec{transform-origin:9px 9px;animation:spin-sec 1s linear infinite;}
@keyframes spin-min{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin-sec{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
<script type="application/ld+json">{
  "@context": "https://schema.org",

<body>
<h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Sign In or Create a Free ScalpClock Account</h1>
<div class="box">
  <a class="brand" href="/">
    <div class="b-mark">
      <svg class="clock-svg" viewBox="0 0 18 18" fill="none" stroke="#16d97e" stroke-width="1.8" stroke-linecap="round">
        <circle cx="9" cy="9" r="7"/>
        <line class="hand-min" x1="9" y1="9" x2="9" y2="4.5"/>
        <line class="hand-sec" x1="9" y1="9" x2="12.5" y2="9"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">Scalp<em>Clock</em></span>
      <span class="brand-motto">The Time To Profit Is Now</span>
    </div>
  </a>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="showTab('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="showTab('signup')">Create Account</div>
    </div>

    <div id="msg"></div>

    <!-- SIGN IN -->
    <div id="signin-form" class="form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="si-btn" onclick="signIn()" style="width:100%;margin-top:4px">Sign In</button>
    </div>

    <!-- SIGN UP -->
    <div id="signup-form" class="form" style="display:none">
      <div style="display:flex;gap:12px;">
        <div class="field" style="flex:1">
          <label>First Name</label>
          <input type="text" id="su-fname" placeholder="Jane">
        </div>
        <div class="field" style="flex:1">
          <label>Last Name</label>
          <input type="text" id="su-lname" placeholder="Doe">
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="su-pass" placeholder="At least 6 characters">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="su-pass2" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="su-btn" onclick="signUp()" style="width:100%;margin-top:4px">Create Account</button>
    </div>
  </div>
  <p class="footer-note">By signing up you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.</p>
  <p class="footer-note" style="margin-top:8px">&copy; 2026 VSLLC. All rights reserved. ScalpClock is a product of VSLLC.</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://fnuqxiflqqejjttxymbz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZudXF4aWZscXFlamp0dHh5bWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzMxODksImV4cCI6MjA5ODAwOTE4OX0.XE1-LPW0043gRFEAl9onCahkmpQ8BMAAtGkF9FqJLiY';

let sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.warn('Supabase init failed:', e.message); }

const _from = new URLSearchParams(location.search).get('from') || '/dashboard';

// Founding Member referral program — the /r/CODE Function sets this cookie
// server-side; /join?ref=CODE lands here (see _redirects) and this is where
// that second entry point sets the identical cookie, so both paths converge
// on one mechanism. 60 days is the default; the real value lives in
// Supabase's referral_program_settings and only matters server-side when
// the cookie is first set — reading it back here just needs the value that's
// already there.
function setReferralCookie(code, days) {
  document.cookie = `scalpclock_ref=${encodeURIComponent(code)}; Max-Age=${days * 86400}; Path=/; SameSite=Lax`;
}
function getReferralCookie() {
  const m = document.cookie.match(/(?:^|;\s*)scalpclock_ref=([^;]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}
const _refFromQuery = new URLSearchParams(location.search).get('ref');
if (_refFromQuery) setReferralCookie(_refFromQuery, 60);

if (sb) sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = _from;
});

if (new URLSearchParams(location.search).get('tab') === 'signup') showTab('signup');

function showTab(tab) {
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('signin-form').style.display = tab === 'signin' ? 'flex' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
  document.getElementById('msg').innerHTML = '';
}

function showMsg(text, type) {
  document.getElementById('msg').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

async function signIn() {
  const email = document.getElementById('si-email').value.trim();
  const pass  = document.getElementById('si-pass').value;
  if (!email || !pass) return showMsg('Please fill in all fields.', 'error');
  const btn = document.getElementById('si-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    if (typeof gtag === 'function') gtag('event', 'login', { method: 'email' });
    window.location.href = _from;
  }
}

function capName(s) {
  return s ? s.trim().charAt(0).toUpperCase() + s.trim().slice(1).toLowerCase() : '';
}

async function signUp() {
  const firstName = document.getElementById('su-fname').value.trim();
  const lastName  = document.getElementById('su-lname').value.trim();
  const email     = document.getElementById('su-email').value.trim();
  const pass      = document.getElementById('su-pass').value;
  const pass2     = document.getElementById('su-pass2').value;
  if (!firstName || !lastName) return showMsg('Please enter your first and last name.', 'error');
  if (!email || !pass) return showMsg('Please fill in all fields.', 'error');
  if (pass !== pass2) return showMsg('Passwords do not match.', 'error');
  if (pass.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
  const btn = document.getElementById('su-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const _refCode = getReferralCookie();
  const signUpMeta = {
    first_name: capName(firstName),
    last_name:  capName(lastName),
    full_name:  capName(firstName) + ' ' + capName(lastName),
  };
  // Stored in user_metadata here purely as a hint — it's client-writable,
  // so the webhook re-derives the real referral relationship at the
  // referred user's first successful checkout rather than trusting this
  // directly (see functions/api/stripe/webhook.js's recordReferralIfAttributed).
  if (_refCode) signUpMeta.referred_by_code = _refCode;

  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: { data: signUpMeta },
  });
  if (error) {
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  } else {
    // Create profiles row immediately so webhook PATCH has a target
    if (data.user) {
      try {
        await sb.from('profiles').upsert({ id: data.user.id, plan: 'free' }, { onConflict: 'id' });
      } catch (_) {}
    }
    if (typeof gtag === 'function') gtag('event', 'sign_up', { method: 'email' });
    showMsg('Account created! Check your email to confirm, then sign in below.', 'success');
    // Auto-switch to sign-in tab after 2 seconds
    setTimeout(() => showTab('signin'), 2000);
  }
}


</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
